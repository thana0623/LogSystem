server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: logsys-api
  datasource:
    postgres:
      url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:logsys_meta}
      username: ${POSTGRES_USER:logsys}
      password: ${POSTGRES_PASSWORD}
      driver-class-name: org.postgresql.Driver
    clickhouse:
      url: jdbc:clickhouse://${CLICKHOUSE_HOST:localhost}:${CLICKHOUSE_PORT:8123}/${CLICKHOUSE_DB:logsys}
      username: ${CLICKHOUSE_USER:logsys}
      password: ${CLICKHOUSE_PASSWORD}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: public

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.logsys: DEBUG

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
